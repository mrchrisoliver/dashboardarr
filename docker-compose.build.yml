# For local building — use: docker compose -f docker-compose.build.yml up -d --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboardarr
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - dashboardarr-data:/var/www/html/database
    environment:
      - APP_NAME=Dashboardarr
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:8080}
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=sync

volumes:
  dashboardarr-data:
